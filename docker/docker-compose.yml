# ─── docker/docker-compose.yml ────────────────────────────────────────────────
#
# Base Docker Compose configuration shared by development and production.
# Do NOT use this file directly — use an environment-specific file instead:
#
#   Development:
#     docker compose -f docker/docker-compose.yml \
#                    -f docker/docker-compose.dev.yml up --build
#
#   Production:
#     docker compose -f docker/docker-compose.yml \
#                    -f docker/docker-compose.prod.yml up -d
#
# Or use the Makefile shortcuts:
#   make docker-up-dev      # development stack
#   make docker-up-prod     # production stack
#
# Quick-start (development):
#   cp backend/.env.example   backend/.env
#   cp frontend/.env.example  frontend/.env.local
#   cp ai-service/.env.example ai-service/.env
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.dev.yml up --build

name: brain-tumor

# ── Shared restart policy ─────────────────────────────────────────────────────
x-restart-policy: &restart-policy
  restart: unless-stopped

# ── Shared logging config ─────────────────────────────────────────────────────
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── AI Service — FastAPI / TensorFlow ──────────────────────────────────────
  ai-service:
    <<: [*restart-policy, *default-logging]
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
      args:
        VERSION: ${APP_VERSION:-1.0.0}
    image: brain-tumor-ai-service:${APP_VERSION:-latest}
    container_name: bt_ai_service
    env_file:
      - ../ai-service/.env
    environment:
      SAVED_MODELS_DIR: /data/models
      DATASET_RAW_DIR:  /data/dataset/raw
      DATASET_PROCESSED_DIR: /data/dataset/processed
      GRADCAM_OUTPUT_DIR: /data/gradcam
      LOG_DIR: /data/logs/ai-service
    volumes:
      - models_volume:/data/models
      - dataset_volume:/data/dataset
      - gradcam_volume:/data/gradcam
      - ai_logs_volume:/data/logs/ai-service
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Backend — Node.js / Express ────────────────────────────────────────────
  backend:
    <<: [*restart-policy, *default-logging]
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        VERSION: ${APP_VERSION:-1.0.0}
    image: brain-tumor-backend:${APP_VERSION:-latest}
    container_name: bt_backend
    env_file:
      - ../backend/.env
    environment:
      NODE_ENV:       production
      PORT:           "5000"
      HOST:           "0.0.0.0"
      AI_SERVICE_URL: "http://ai-service:8000"
      UPLOAD_DIR:     /data/uploads
      DATASET_DIR:    /data/dataset
      DB_PATH:        /data/db/brain_tumor.db
    volumes:
      - uploads_volume:/data/uploads
      - dataset_volume:/data/dataset
      - db_volume:/data/db
      - gradcam_volume:/data/gradcam:ro
      - backend_logs_volume:/data/logs/backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - app_network
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Frontend — React → nginx ────────────────────────────────────────────────
  frontend:
    <<: [*restart-policy, *default-logging]
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL:        "${VITE_API_BASE_URL:-http://localhost:5000}"
        VITE_AI_SERVICE_URL:      "${VITE_AI_SERVICE_URL:-http://localhost:8000}"
        VITE_APP_NAME:            "${VITE_APP_NAME:-Brain Tumour Detection}"
        VITE_ENABLE_GRADCAM:      "${VITE_ENABLE_GRADCAM:-true}"
        VITE_ENABLE_COMPARISON:   "${VITE_ENABLE_COMPARISON:-true}"
        VITE_ENABLE_BATCH:        "${VITE_ENABLE_BATCH:-true}"
        VITE_ENABLE_TRAINING:     "${VITE_ENABLE_TRAINING:-true}"
        VERSION:                  ${APP_VERSION:-1.0.0}
    image: brain-tumor-frontend:${APP_VERSION:-latest}
    container_name: bt_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    networks:
      - app_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nginx-health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

# ─────────────────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  dataset_volume:
    driver: local
  models_volume:
    driver: local
  gradcam_volume:
    driver: local
  uploads_volume:
    driver: local
  db_volume:
    driver: local
  ai_logs_volume:
    driver: local
  backend_logs_volume:
    driver: local
