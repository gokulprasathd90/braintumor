# ─── docker/nginx.conf ────────────────────────────────────────────────────────
#
# nginx configuration for the React SPA (standalone frontend container).
# This file is used by docker/Dockerfile.frontend Stage 2.
#
# For the full reverse-proxy setup (with backend + AI service proxying),
# use docker/nginx/default.conf instead.
#
# Responsibilities:
#   1. Serve the Vite build output from /usr/share/nginx/html
#   2. Rewrite all unknown paths to index.html (SPA client-side routing)
#   3. Security headers on all responses
#   4. Gzip compression for JS/CSS/JSON assets
#   5. Cache headers (long TTL for hashed assets, no-cache for HTML)
#   6. Health probe endpoint

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Static assets: hashed filenames — cache 1 year ───────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        try_files  $uri =404;
    }

    # ── HTML — always revalidate ──────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires    0;
    }

    # ── SPA fallback — all routes serve index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health probe for Docker / load-balancer ───────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
