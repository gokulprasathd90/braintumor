# ─── docker/nginx/default.conf ────────────────────────────────────────────────
#
# nginx virtual-host configuration for the Brain Tumour Detection app.
#
# Responsibilities:
#   1. Serve the React SPA from /usr/share/nginx/html
#   2. Reverse-proxy /api/* requests to the Node.js backend (port 5000)
#   3. Reverse-proxy /ai/* requests to the Python AI service (port 8000)
#   4. Enforce security headers on all responses
#   5. Set optimal cache headers (hashed assets vs HTML vs API)
#   6. SPA fallback routing — unknown paths serve index.html
#   7. Gzip compression (configured in nginx.conf)
#   8. Health probe endpoint for Docker / load-balancers
#
# Upstream DNS resolution
# ───────────────────────
# Service names match the docker-compose service names:
#   backend    → http://backend:5000
#   ai-service → http://ai-service:8000
#
# HTTPS readiness
# ───────────────
# Uncomment the TLS server block below and mount certificates at:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
#
# ──────────────────────────────────────────────────────────────────────────────

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream backend_upstream {
    server backend:5000;
    keepalive 32;
}

upstream ai_service_upstream {
    server ai-service:8000;
    keepalive 16;
}

# ── HTTP server (port 8080, non-root) ────────────────────────────────────────
server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_zone 100;

    # ── Global security headers ───────────────────────────────────────────────
    # Applied to every response including proxied ones.
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header X-Download-Options        "noopen"                        always;
    add_header X-Permitted-Cross-Domain-Policies "none"                  always;

    # Strict-Transport-Security — only activate when serving over HTTPS
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content-Security-Policy — tighten for your deployment
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "font-src 'self'; "
        "connect-src 'self'; "
        "frame-ancestors 'none';"
        always;

    # ── Health probe (no auth, no logging) ───────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API proxy → Node.js backend ──────────────────────────────────────────
    # All requests to /api/* are forwarded to the Express backend.
    location /api/ {
        limit_req zone=api_zone burst=60 nodelay;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;   # long for training requests
        proxy_read_timeout    300s;

        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 16k;

        # Do not cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── AI service proxy → FastAPI ────────────────────────────────────────────
    # Requests to /ai/* are forwarded to the Python AI service.
    # Also proxies /ai-docs and /ai-redoc for the FastAPI Swagger UI.
    location /ai/ {
        limit_req zone=api_zone burst=30 nodelay;

        rewrite ^/ai/(.*)$ /api/v1/$1 break;
        proxy_pass         http://ai_service_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;   # long for training + batch inference
        proxy_read_timeout    600s;

        # Large body for MRI image uploads and ZIP batches
        client_max_body_size 100m;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Upload endpoint — specific rate limiting ──────────────────────────────
    location ~* ^/api/(predict|upload) {
        limit_req zone=upload_zone burst=10 nodelay;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 50m;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        add_header Cache-Control "no-store" always;
    }

    # ── Static assets: hashed filenames → cache 1 year ───────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|gif|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        try_files  $uri =404;
    }

    # ── SVG assets ────────────────────────────────────────────────────────────
    location ~* \.svg$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Type  "image/svg+xml";
        try_files  $uri =404;
    }

    # ── HTML — always revalidate ──────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback — all unmatched routes serve index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # HTML files should not be cached
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;
}


