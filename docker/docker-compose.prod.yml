# ─── docker/docker-compose.prod.yml ───────────────────────────────────────────
#
# Production overlay — extends docker-compose.yml with:
#   - Resource limits (CPU + memory)
#   - Read-only root filesystems where possible
#   - Secrets-based sensitive environment variables
#   - Always-restart policy
#   - Production logging
#   - Security options (no-new-privileges)
#   - Multiple AI service replicas (optional)
#
# Usage:
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.prod.yml up -d
#
# Or via Makefile:
#   make docker-up-prod
#
# Prerequisites:
#   - Docker Secrets must be created before startup:
#       echo "your-jwt-secret" | docker secret create jwt_secret_key -
#       echo "your-jwt-secret" | docker secret create jwt_secret_key -
#   - For standalone Compose (non-Swarm), secrets are read from files:
#       Create docker/secrets/ directory with secret files (git-ignored)

name: brain-tumor

secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  db_encryption_key:
    file: ./secrets/db_encryption_key.txt

services:

  # ── AI Service — production hardening ─────────────────────────────────────
  ai-service:
    restart: always
    secrets:
      - jwt_secret_key
    environment:
      AI_SERVICE_ENV:    production
      AI_SERVICE_DEBUG:  "false"
      LOG_LEVEL:         INFO
      # Reference the Docker secret file path
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
    security_opt:
      - no-new-privileges:true
    read_only: false       # TF writes to /tmp; set true once verified
    tmpfs:
      - /tmp:size=256m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"

  # ── Backend — production hardening ────────────────────────────────────────
  backend:
    restart: always
    secrets:
      - db_encryption_key
    environment:
      NODE_ENV:   production
      LOG_LEVEL:  warn
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

  # ── Frontend — production hardening ───────────────────────────────────────
  frontend:
    restart: always
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp/nginx:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=1777
      - /var/run:size=10m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        compress: "true"
