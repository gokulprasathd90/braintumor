# ─── docker/nginx/nginx.conf ──────────────────────────────────────────────────
#
# Global nginx configuration for the Brain Tumour Detection reverse proxy.
# This file replaces /etc/nginx/nginx.conf inside the frontend container.
#
# Tuning
# ──────
#   worker_processes auto   — one worker per CPU core
#   worker_connections 1024 — concurrent connections per worker
#   keepalive_timeout  75   — matches uvicorn's --timeout-keep-alive
#
# Non-root operation
# ──────────────────
#   pid            /tmp/nginx.pid — writable by non-root user
#   client_body_temp_path etc. — redirect all temp paths to /tmp

user appuser appgroup;
worker_processes auto;
pid /tmp/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Temp paths writable by non-root ──────────────────────────────────────
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    client_max_body_size 50m;     # allow large MRI image uploads
    server_tokens      off;       # hide nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Upstream API rate-limiting zones (applied in default.conf)
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Include per-server configuration
    include /etc/nginx/conf.d/*.conf;
}
