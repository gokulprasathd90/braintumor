# ─── .pre-commit-config.yaml ──────────────────────────────────────────────────
#
# Pre-commit hooks for Brain Tumour Detection.
# Install: pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
#
# Hooks run on every `git commit` to catch issues before they reach CI.

repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "docs/.*\\.md$"
      - id: end-of-file-fixer
        exclude: "docs/.*\\.md$"
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: "tsconfig.*\\.json$"
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Python: ruff (lint + import sort) ─────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^ai-service/
      - id: ruff-format
        files: ^ai-service/

  # ── Python: black ──────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^ai-service/
        language_version: python3.12

  # ── Python: isort ──────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^ai-service/
        args: [--profile=black]

  # ── JavaScript / TypeScript: prettier ─────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|css|md)$
        exclude: "(node_modules|dist|coverage|package-lock\\.json)"

  # ── Dockerfile lint ────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: Dockerfile.*
        args: [--ignore, DL3008, --ignore, DL3013]
        # DL3008: apt pinning (acceptable)
        # DL3013: pip pinning (we use requirements.txt)

  # ── Shell scripts ─────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.(sh)$

  # ── Secrets detection ──────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: "(package-lock\\.json|\\.env\\.example)"
