# ─── .github/workflows/ci.yml ─────────────────────────────────────────────────
#
# Continuous Integration — Brain Tumour Detection
#
# Triggers:
#   push    → main, develop, release/*
#   pull_request → main, develop
#
# Jobs (parallel where possible):
#   lint-ai       — ruff + black + isort check (Python)
#   lint-frontend — ESLint + Prettier + tsc (TypeScript/React)
#   lint-backend  — ESLint (Node.js)
#   test-ai       — pytest with coverage (Python)
#   test-frontend — vitest run with coverage (React)
#   test-backend  — jest (Node.js)
#   docker-build  — builds all three images, pushes to GHCR on main
#   security-scan — Trivy vulnerability scan on built images

name: CI

on:
  push:
    branches: [main, develop, "release/*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:    ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Python linting ──────────────────────────────────────────────────────
  lint-ai:
    name: "Lint · Python (ruff + black + isort)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-service/requirements*.txt

      - name: Install linting tools
        run: pip install --no-cache-dir ruff==0.8.4 black==24.10.0 isort==5.13.2

      - name: ruff check
        run: ruff check app/ tests/ --output-format=github

      - name: black --check
        run: black --check --diff app/ tests/

      - name: isort --check
        run: isort --check-only --diff app/ tests/

  # ── 2. Frontend linting ────────────────────────────────────────────────────
  lint-frontend:
    name: "Lint · Frontend (ESLint + Prettier + tsc)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  # ── 3. Backend linting ─────────────────────────────────────────────────────
  lint-backend:
    name: "Lint · Backend (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --if-present

  # ── 4. Python tests ────────────────────────────────────────────────────────
  test-ai:
    name: "Test · Python (pytest)"
    runs-on: ubuntu-latest
    needs: [lint-ai]
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-service/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run pytest with coverage
        env:
          AI_SERVICE_ENV: test
          BCRYPT_ROUNDS:  "4"
        run: |
          pytest \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ai-service/coverage.xml
          flags: ai-service
          name: ai-service-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-results-${{ github.run_number }}
          path: ai-service/coverage.xml
          retention-days: 7

  # ── 5. Frontend tests ──────────────────────────────────────────────────────
  test-frontend:
    name: "Test · Frontend (vitest)"
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results-${{ github.run_number }}
          path: frontend/coverage/
          retention-days: 7

  # ── 6. Backend tests ───────────────────────────────────────────────────────
  test-backend:
    name: "Test · Backend (jest)"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --forceExit

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-${{ github.run_number }}
          path: backend/coverage/
          retention-days: 7

  # ── 7. Docker build & push ─────────────────────────────────────────────────
  docker-build:
    name: "Docker · Build & Push"
    runs-on: ubuntu-latest
    needs: [test-ai, test-frontend, test-backend]
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image:      ai-service
            dockerfile: ai-service/Dockerfile
            context:    .
            name:       brain-tumor-ai-service
          - image:      backend
            dockerfile: docker/Dockerfile.backend
            context:    .
            name:       brain-tumor-backend
          - image:      frontend
            dockerfile: docker/Dockerfile.frontend
            context:    .
            name:       brain-tumor-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context:     ${{ matrix.context }}
          file:        ${{ matrix.dockerfile }}
          push:        ${{ github.event_name != 'pull_request' }}
          tags:        ${{ steps.meta.outputs.tags }}
          labels:      ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.image }}
          platforms:  linux/amd64

      - name: Export image for security scan
        uses: docker/build-push-action@v6
        if: github.event_name == 'pull_request'
        with:
          context:  ${{ matrix.context }}
          file:     ${{ matrix.dockerfile }}
          push:     false
          load:     true
          tags:     ${{ matrix.name }}:scan
          cache-from: type=gha,scope=${{ matrix.image }}

  # ── 8. Security scan ───────────────────────────────────────────────────────
  security-scan:
    name: "Security · Trivy vulnerability scan"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan — AI service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/brain-tumor-ai-service:sha-${{ github.sha }}
          format:    sarif
          output:    trivy-ai.sarif
          severity:  CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-ai.sarif
          category:   trivy-ai-service

  # ── 9. CI summary ──────────────────────────────────────────────────────────
  ci-summary:
    name: "CI · All checks passed"
    runs-on: ubuntu-latest
    needs: [lint-ai, lint-frontend, lint-backend, test-ai, test-frontend, test-backend, docker-build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Job results: $results"
          if echo "$results" | grep -qE "(failure|cancelled)"; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
